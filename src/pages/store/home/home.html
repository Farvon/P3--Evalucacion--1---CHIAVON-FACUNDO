<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header>
      <h1>Food Store</h1>
      <nav>
        <ul>
          <li><a href="#">Inicio</a></li>
          <li><a href="#">Mis Pedidos</a></li>
          <li><a href="#">Carrito</a></li>
        </ul>
      </nav>
      <button id="logoutButton">Cerrar Sesión</button>
    </header>

    <aside>
      <h2 id="categorias">Categorías</h2>
      <ul id="lista-categorias"></ul>
    </aside>

    <main>
      <form>
        <label for="buscarProducto">Buscar Productos:</label>
        <input
          type="text"
          id="buscarProducto"
          name="search"
          placeholder="Ej: Hamburguesa"
        />
        <div id="cartIconContainer">
          <img id="cartIcon" src="/assets/icons/cart.png" alt="Carrito" />
          <div id="cartElementCount">0</div>
        </div>
      </form>

      <h2>Productos Destacados</h2>
      <section id="contenedor-productos"></section>
    </main>
  </body>

  <footer>
    <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
    <p>Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>
  </footer>

  <script src="../../../data/data.ts"></script>
  <script src="./home.ts"></script>
  <script type="module" src="./home.ts"></script>
</html>
